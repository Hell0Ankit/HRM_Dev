{% extends "base.html" %}
{% load static %}
{% block title %} Sign-in {% endblock title %}
{% block extra_css %}    {% endblock %}
{% block content %}  
<!-- Hero Section with Featured Blog Slider -->
<section class="section-custom py-24 bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-lg p-8">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-2 mb-4">
          <div class="logo ">
              <img src="{% static 'images/logo/logo.png' %}" alt="logo" width="100%" height="auto" >
            </div>
        </div>
        <!-- Heading -->
        <h2 class="text-center secondary-heading mb-2"> Create Your Account  </h2>
        <p class="text-center body-bold-text"> Join us and start your journey today </p>
        <!-- Form -->
        <form class="space-y-2">
            <div class="w-full">
                <label class="body-bold-text block py-2">User Name </label>
                <input type="text" placeholder="Enter your username" class="input" />
            </div>

            <div class="w-full">
                <label class="body-bold-text block py-2"> Email ID</label>
                <input type="email" placeholder="Enter your Email" class="input" />
            </div>

            <div class="w-full">
                <label class="body-bold-text block py-2"> Password</label>
                <input type="password" placeholder="Enter a strong Password" class="input" />
            </div>

            <div class="w-full">
                <label class="body-bold-text block py-2">Confirm Password</label>
                <input type="password" placeholder="Confirm Password" class="input" />
            </div>
            <!-- Button -->
            <div class="p-0 ">
                <button type="submit" class=" mt-4 btn btn-primary w-[100%] px-4"> Sign-Up </button>
            </div>
        </form>
        <!-- Footer -->
        <p class="text-center body-text mt-4"> Already have an account? 
        <a href="{% url 'login'  %}" class="body-bold-text text-[var(--primary)]">Sign In</a>
        </p>
        <!-- Divider -->
        <div class="flex items-center my-5">
          <div class="flex-grow border-t"></div>
          <span class="mx-3 body-bold-text">or</span>
          <div class="flex-grow border-t"></div>
        </div>

        <!-- Social Icons -->
        <div class="social  flex justify-center gap-2">
            <a href="#" class="small-icon icon-primary"><i class="fa-brands fa-facebook text-[20px]"></i></a>
            <a href="#" class="small-icon icon-primary"><i class="fa-brands fa-x-twitter text-[20px]"></i></a>
            <a href="#" class="small-icon icon-primary"><i class="fa-brands fa-whatsapp text-[20px]"></i></a>
            <a href="#" class="small-icon icon-primary"><i class="fa-brands fa-linkedin text-[20px]"></i></a>
        </div>
    </div>
</section>
{% endblock %}
{% block scripts %}  {% endblock %}
